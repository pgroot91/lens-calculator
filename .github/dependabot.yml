version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"

    schedule:
      interval: "weekly"

    allow:
      - dependency-type: "direct"

    groups:
      testing:
        patterns:
          - "jest*"
          - "@playwright/*"
          - "cypress"

      wordpress:
        patterns:
          - "@wordpress/*"

      build:
        patterns:
          - "vite"
          - "@babel/*"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"

  - package-ecosystem: "composer"
    directory: "/"

    schedule:
      interval: "weekly"

    allow:
      - dependency-type: "direct"

    open-pull-requests-limit: 3

    labels:
      - "dependencies"